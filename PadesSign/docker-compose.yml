version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStr0ngP@ssword"
      ACCEPT_EULA: "Y"
    ports: ["1433:1433"]
    volumes:
      - sqldata:/var/opt/mssql

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports: ["10000:10000"]
    volumes:
      - blobdata:/data
    command: "azurite-blob --blobHost 0.0.0.0"

  api:
    build:
      context: .
      dockerfile: src/PadesSign.Api/Dockerfile
    ports: ["5000:8080"]
    environment:
      ConnectionStrings__DefaultConnection: >
        Server=db;Database=PadesSign;User Id=sa;
        Password=YourStr0ngP@ssword;TrustServerCertificate=True
      Azure__Storage__ConnectionString: >
        DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;
        AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UKvz5oo7f+iqJKYn5hPT4LGQ==;
        BlobEndpoint=http://azurite:10000/devstoreaccount1;
      Azure__Storage__Container: padessign
      Pades__TsaUrl: "https://freetsa.org/tsr"
      App__BaseUrl: "http://localhost:5000"
    depends_on:
      - db
      - azurite

volumes:
  sqldata:
  blobdata: